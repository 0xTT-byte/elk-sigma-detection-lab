title: Suspicious Credential Access via Shadow File
id: b3f8a1c2-d4e5-6789-abcd-ef0123456789
status: experimental
description: >
  Detects suspicious access to /etc/shadow or credential dumping activity
  on Linux systems. This technique is mapped to MITRE ATT&CK T1003 -
  OS Credential Dumping.
author: Omar Fattouh
date: 2026/03/06
references:
  - https://attack.mitre.org/techniques/T1003/
tags:
  - attack.credential_access
  - attack.t1003
logsource:
  product: linux
  category: file_access
detection:
  selection:
    event: credential_access
    message|contains: '/etc/shadow'
  condition: selection
fields:
  - timestamp
  - event
  - message
  - user
  - host
falsepositives:
  - Legitimate system administrator activity
  - Backup scripts that read shadow file
  - Security scanning tools
level: high
